<!DOCTYPE html>
<html>
<head>
    <title>CV Ardila Sabila</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        nav {
            background: rgba(0,0,0,0.7);
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 8px;
            text-decoration: none;
        }

        nav a:hover {
            color: #ffd369;
        }

        .section {
            display: none;
            padding: 20px;
            color: white;
        }

        .active {
            display: block;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            margin: 30px auto;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            border: 3px solid white;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #ffd369;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: orange;
        }
    </style>
</head>

<body>

<nav>
    <a href="#" class="menu" data-target="home">Home</a>
    <a href="#" class="menu" data-target="about">About</a>
    <a href="#" class="menu" data-target="contact">Contact</a>
</nav>

<!-- HOME -->
<div id="home" class="section active">
    <div class="card">
        <h1>Hi, I'm Ardila 👋</h1>
        <img src="foto.jpeg">
        <p>Aku mahasiswa yang lagi belajar web development dan terus coba hal-hal baru di dunia teknologi.</p>
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <div class="card">
        <h2>Tentang Aku</h2>
        <p>Aku suka belajar hal baru dan lagi fokus ngembangin skill di bidang IT, terutama web.</p>
    </div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
    <div class="card">
        <h2>Contact</h2>

        <input type="text" id="nama" placeholder="Nama"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <textarea id="pesan" placeholder="Pesan"></textarea><br>

        <button onclick="kirim()">Kirim</button>
        <p id="error" style="color:red;"></p>
    </div>
</div>

<script>
$(".menu").click(function(){
    let target = $(this).data("target");
    $(".section").hide();
    $("#" + target).fadeIn();
});

function kirim(){
    let nama = $("#nama").val();
    let email = $("#email").val();
    let pesan = $("#pesan").val();

    if(nama=="" || email=="" || pesan==""){
        $("#error").text("Semua harus diisi!");
        return;
    }

    alert("Pesan berhasil dikirim!");

    // 🔥 ini yang bikin form kosong
    $("#nama").val("");
    $("#email").val("");
    $("#pesan").val("");
    $("#error").text("");
}
</script>

</body>
</html>
