<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CV Ardila Sabila - Interactive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #6c5ce7, #a29bfe); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        
        /* Navbar Slide */
        .navbar { width: 100%; max-width: 500px; display: flex; overflow-x: auto; gap: 15px; padding: 15px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 20px; margin-bottom: 20px; }
        .navbar::-webkit-scrollbar { display: none; }
        .navbar a { text-decoration: none; color: white; font-size: 11px; font-weight: 600; text-transform: uppercase; cursor: pointer; padding: 8px 15px; border-radius: 10px; }
        .navbar a.active { background: white; color: #6c5ce7; }

        /* Card Utama */
        .cv-card { width: 100%; max-width: 450px; background: white; border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); overflow: hidden; min-height: 550px; position: relative; }

        .page { display: none; padding: 30px 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Form Input Style */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; font-weight: 600; color: #6c5ce7; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9fb; font-size: 13px; }
        
        .btn-save { width: 100%; padding: 12px; background: #6c5ce7; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* Display Area */
        .result-box { margin-top: 20px; padding: 15px; background: #f0f2f5; border-radius: 15px; font-size: 13px; border-left: 5px solid #6c5ce7; }

        /* Home Content */
        .home-profile { text-align: center; }
        .home-profile img { width: 150px; height: 150px; border-radius: 25px; object-fit: cover; border: 4px solid #eee; margin-bottom: 15px; }

        /* Portfolio Box */
        .project-box { background: #f8f9ff; border: 2px dashed #6c5ce7; border-radius: 25px; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a onclick="showPage('home')" id="nav-home" class="active">Home</a>
        <a onclick="showPage('portfolio')" id="nav-portfolio">Portfolio</a>
        <a onclick="showPage('about')" id="nav-about">About</a>
        <a onclick="showPage('contact')" id="nav-contact">Contact</a>
    </nav>

    <div class="cv-card">
        <div id="home" class="page active">
            <div class="home-profile">
                <img src="foto.jpeg" alt="Ardila Sabila">
                <h1 id="disp-nama">Ardila Sabila</h1>
                <p style="color: #636e72;">Mahasiswa Ma'soem University</p>
            </div>
        </div>

        <div id="portfolio" class="page">
            <h2 style="color:#6c5ce7; margin-bottom:15px;">My Project</h2>
            <div class="project-box">
                <i class="bi bi-phone" style="font-size: 40px; color: #6c5ce7;"></i>
                <h3>Smart Campus Mobile</h3>
                <a href="https://smart-campus-mobile-ardila.vercel.app/" target="_blank" style="display:inline-block; margin-top:10px; background:#6c5ce7; color:white; padding:10px 20px; border-radius:10px; text-decoration:none; font-weight:600;">Buka Aplikasi</a>
            </div>
        </div>

        <div id="about" class="page">
            <h2 style="color:#6c5ce7; margin-bottom:15px;">Update About</h2>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="in-nama" placeholder="Masukkan nama...">
            </div>
            <div class="form-group">
                <label>Kata Keterangan (Bio)</label>
                <textarea id="in-bio" rows="3" placeholder="Ceritakan tentang kamu..."></textarea>
            </div>
            <button class="btn-save" onclick="saveAbout()">Simpan Data</button>
            
            <div class="result-box" id="res-about">Data akan muncul di sini...</div>
        </div>

        <div id="contact" class="page">
            <h2 style="color:#6c5ce7; margin-bottom:15px;">Contact Me</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="in-email" placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Pesan / No. HP</label>
                <input type="text" id="in-pesan" placeholder="Masukkan pesan...">
            </div>
            <button class="btn-save" onclick="saveContact()">Simpan Kontak</button>
            
            <div class="result-box" id="res-contact">Kontak tersimpan di sini...</div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.navbar a').forEach(a => a.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        function saveAbout() {
            const nama = document.getElementById('in-nama').value;
            const bio = document.getElementById('in-bio').value;
            if(nama && bio) {
                document.getElementById('disp-nama').innerText = nama;
                document.getElementById('res-about').innerHTML = `<strong>${nama}</strong><br>${bio}`;
                alert("Data About Berhasil Disimpan!");
            }
        }

        function saveContact() {
            const email = document.getElementById('in-email').value;
            const pesan = document.getElementById('in-pesan').value;
            if(email && pesan) {
                document.getElementById('res-contact').innerHTML = `Email: ${email}<br>Info: ${pesan}`;
                alert("Kontak Berhasil Disimpan!");
            }
        }
    </script>
</body>
</html>
