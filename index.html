<!DOCTYPE html>
<html>

<head>
    <title>CV Ardila Sabila</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="background-color" content="#ffffff">

    <!-- iOS -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        nav {
            background: rgba(0,0,0,0.6);
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 5px;
            text-decoration: none;
        }

        .section { display:none; padding:20px; color:white; }
        .active { display:block; }

        .card {
            background: rgba(255,255,255,0.1);
            padding:20px;
            border-radius:15px;
            margin:20px auto;
            max-width:500px;
            text-align:center;
        }

        img {
            width:120px;
            height:120px;
            border-radius:10px;
        }

        /* SPLASH MANUAL */
        #loading {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#ffffff;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }
    </style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="loading">
    <img src="icon-512.png" width="120">
</div>

<nav>
    <a href="#" class="menu" data-target="home">Home</a>
    <a href="#" class="menu" data-target="about">About</a>
</nav>

<div id="home" class="section active">
    <div class="card">
        <h1>Ardila Sabila</h1>
        <img src="foto.jpeg">
        <p>Mahasiswa yang tertarik di bidang web development.</p>
    </div>
</div>

<div id="about" class="section">
    <div class="card">
        <h2>Tentang Saya</h2>
        <p>Saya ingin berkembang di dunia IT.</p>
    </div>
</div>

<script>
$(".menu").click(function(){
    let target = $(this).data("target");
    $(".section").hide();
    $("#" + target).show();
});

// splash delay (BIAR KELIHATAN)
window.onload = function(){
    setTimeout(()=>{
        document.getElementById("loading").style.display = "none";
    }, 1500);
}
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
    .then(()=>console.log("SW aktif"))
    .catch(err=>console.log("SW gagal", err));
}
</script>

</body>
</html>
